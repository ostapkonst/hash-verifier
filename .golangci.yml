version: "2"

run:
  timeout: 10m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - zerologlint
    - nilnil
    - nilerr
    - godot
    - gocritic
    - goconst
    - gomoddirectives
    - noctx
    - wsl_v5
    - gomodguard
    - unconvert

formatters:
  enable:
    - goimports
    - gofumpt
  settings:
    gofumpt:
      module-path: github.com/ostapkonst/HashVerifier
    goimports:
      local-prefixes:
        - github.com/ostapkonst/HashVerifier