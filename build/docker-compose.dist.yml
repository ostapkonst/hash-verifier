services:
  linux-amd64:
    build:
      context: ..
      dockerfile: build/Dockerfile.dist
      target: linux-builder
      platforms:
        - linux/amd64
      args:
        - VERSION=${VERSION:-unknown}
    volumes:
      - ../dist/linux-amd64:/dist

  linux-arm64:
    build:
      context: ..
      dockerfile: build/Dockerfile.dist
      target: linux-arm64-builder
      platforms:
        - linux/arm64
      args:
        - VERSION=${VERSION:-unknown}
    volumes:
      - ../dist/linux-arm64:/dist

  windows-amd64:
    build:
      context: ..
      dockerfile: build/Dockerfile.dist
      target: windows-dist
      platforms:
        - linux/amd64
      args:
        - VERSION=${VERSION:-unknown}
    volumes:
      - ../dist/windows-amd64:/dist

  windows-i686:
    build:
      context: ..
      dockerfile: build/Dockerfile.dist
      target: windows-dist-i686
      platforms:
        - linux/amd64
      args:
        - VERSION=${VERSION:-unknown}
    volumes:
      - ../dist/windows-i686:/dist
