services:
  package-builder:
    build:
      context: ..
      dockerfile: build/Dockerfile.packages
      target: package-builder
      platforms:
        - linux/amd64
    volumes:
      - ../dist:/app/dist
      - ../build:/app/build
      - ../.pkg-build:/app/.pkg-build
      - ../LICENSE:/app/LICENSE
      - ../THIRD_PARTY_NOTICES:/app/THIRD_PARTY_NOTICES
    environment:
      - VERSION

  deb-arm64:
    build:
      context: ..
      dockerfile: build/Dockerfile.packages
      target: package-builder-arm64
      platforms:
        - linux/arm64
    volumes:
      - ../dist:/app/dist
      - ../build:/app/build
      - ../.pkg-build:/app/.pkg-build
      - ../LICENSE:/app/LICENSE
      - ../THIRD_PARTY_NOTICES:/app/THIRD_PARTY_NOTICES
    environment:
      - VERSION
      - PACKAGE_ARCH=arm64

  rpm-arm64:
    build:
      context: ..
      dockerfile: build/Dockerfile.packages
      target: package-builder-arm64
      platforms:
        - linux/arm64
    volumes:
      - ../dist:/app/dist
      - ../build:/app/build
      - ../.pkg-build:/app/.pkg-build
      - ../LICENSE:/app/LICENSE
      - ../THIRD_PARTY_NOTICES:/app/THIRD_PARTY_NOTICES
    environment:
      - VERSION
      - PACKAGE_ARCH=aarch64
